# Pre-Lesson: Hiragana S-row & T-row
meta:
  id: hiragana-02-s-t
  title:
    en: "Hiragana: S-row & T-row"
    ja: "ひらがな：さ行とた行"
    zh: "平假名：sa行與ta行"
  description:
    en: "Learn the sa-row and ta-row characters"
    ja: "さ行とた行の文字を学びましょう"
    zh: "學習sa行和ta行的文字"
  icon: "さ"
  order: 0.2
  level: foundation
  type: pre-lesson
  group:
    en: "Hiragana"
    ja: "ひらがな"
    zh: "平假名"
  estimatedMinutes: 15
  prerequisite: hiragana-01-vowels-k

characters:
  - id: sa
    char: "さ"
    reading: "sa"
    romaji: "sa"
    audio_hint: "sa, as in 'saw'"
    mnemonic:
      en: "A person sitting on a SAd bench"
      zh: "一個人坐在憂傷的長椅上"
    stroke_count: 3
    row: "s"
    examples:
      - word: "さくら"
        reading: "sakura"
        meaning: { en: "cherry blossom", zh: "櫻花" }
      - word: "さかな"
        reading: "sakana"
        meaning: { en: "fish", zh: "魚" }

  - id: shi
    char: "し"
    reading: "shi"
    romaji: "shi"
    audio_hint: "shee, as in 'she'"
    mnemonic:
